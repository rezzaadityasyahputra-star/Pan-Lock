<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanLock - Unlock Your Link</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- RESET & ROOT STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
        }

        /* --- HEADER (NAMA WEB DI TENGAH ATAS) --- */
        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: #000000;
            text-transform: uppercase;
        }

        header p {
            font-size: 0.95rem;
            color: #6b7280;
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        /* --- MAIN LOCK CONTAINER --- */
        main {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            border: 2px solid #e5e7eb;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            animation: fadeInUp 0.8s ease-out 0.2s both;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* --- TASK BUTTONS (TOMBOL TUGAS) --- */
        .btn-task {
            width: 100%;
            padding: 1.2rem;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .btn-task:hover {
            background: #1f2937;
            transform: translateY(-2px);
        }

        /* Bungkus teks agar status badge terdorong ke kanan */
        .btn-content {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        /* Logo YT Style */
        .yt-icon {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            transition: fill 0.3s ease;
        }

        /* Status Badge di dalam Tombol Tugas */
        .status-badge {
            font-size: 0.85rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        /* Ketika Tugas Selesai */
        .btn-task.completed {
            background: #f3f4f6;
            color: #9ca3af;
            cursor: not-allowed;
            transform: none;
            border: 2px solid #e5e7eb;
        }

        .btn-task.completed .yt-icon {
            fill: #9ca3af;
        }

        .btn-task.completed .status-badge {
            background: #22c55e;
            color: #ffffff;
        }

        /* --- ACTION BUTTON (TOMBOL LANJUTKAN) --- */
        .btn-continue {
            width: 100%;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 800;
            border: none;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            background: #e5e7eb;
            color: #9ca3af;
            cursor: not-allowed;
            pointer-events: none; 
        }

        .btn-continue.active {
            background: #22c55e;
            color: #ffffff;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-continue.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(34, 197, 94, 0.4);
            filter: brightness(1.05);
        }

        /* --- ALERT CRITICAL (ANTI LICIK) --- */
        .cheat-alert {
            display: none; /* Tersembunyi secara default */
            background: #fef2f2;
            border: 2px solid #ef4444;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            color: #991b1b;
            flex-direction: column;
            gap: 1.2rem;
            animation: shake 0.5s ease-in-out;
        }

        .cheat-alert h3 {
            font-size: 1.3rem;
            font-weight: 800;
        }

        .cheat-alert p {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.5;
        }

        .btn-home {
            padding: 0.8rem 1.5rem;
            background: #ef4444;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn-home:hover {
            background: #dc2626;
            transform: scale(1.02);
        }

        /* --- ANIMASI --- */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <header>
        <h1>PanLock</h1>
        <p id="subTitle">Selesaikan tugas di bawah untuk membuka link</p>
    </header>

    <main>
        <div id="contentSection" style="display: flex; flex-direction: column; gap: 1.5rem; width: 100%;">
            <button id="btnSub" class="btn-task" onclick="doTask('sub', 'https://www.youtube.com/@TargetChannelMu')">
                <div class="btn-content">
                    <svg class="yt-icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>Subscribe Channel YT</span>
                </div>
                <span id="badgeSub" class="status-badge">Belum</span>
            </button>

            <button id="btnBell" class="btn-task" onclick="doTask('bell', 'https://www.youtube.com/@TargetChannelMu')">
                <div class="btn-content">
                    <svg class="yt-icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>Sub & Hit Bell</span>
                </div>
                <span id="badgeBell" class="status-badge">Belum</span>
            </button>

            <button id="btnContinue" class="btn-continue" onclick="navigateDestination()">
                Lanjutkan
            </button>
        </div>

        <div id="cheatAlert" class="cheat-alert">
            <h3>⚠️ DETEKSI SISTEM</h3>
            <p>Wah lu mau licik, kagak bisa Bray!<br>Lu harus lewat website utama terlebih dahulu.</p>
            <a href="https://panda-vgk.vercel.app/" class="btn-home">Kembali ke Beranda</a>
        </div>
    </main>

    <script>
        // --- PROTEKSI SCRIPT (ANTI LICIK) ---
        window.addEventListener('DOMContentLoaded', () => {
            const referrer = document.referrer;
            
            // Mengecek apakah asal kedatangan user beneran dari website utamamu
            // Jika kosong (artinya ketik manual/copas langsung) atau tidak mengandung domain utamamu:
            if (!referrer.includes("panda-vgk.vercel.app")) {
                // Sembunyikan semua tombol misi utama
                document.getElementById('contentSection').style.display = 'none';
                document.getElementById('subTitle').style.display = 'none';
                
                // Tampilkan kotak peringatan licik
                const alertContainer = document.getElementById('cheatAlert');
                alertContainer.style.display = 'flex';
            }
        });

        // --- SISTEM PEMBUKA LINK ---
        let isSubscribed = false;
        let isBelled = false;
        const DESTINATION_LINK = "https://google.com"; // <-- LINK AKHIR COCOK MASUKKAN DI SINI

        function doTask(type, url) {
            window.open(url, '_blank');

            if (type === 'sub') {
                isSubscribed = true;
                document.getElementById('btnSub').classList.add('completed');
                document.getElementById('badgeSub').innerHTML = '✓ Selesai';
            } else if (type === 'bell') {
                isBelled = true;
                document.getElementById('btnBell').classList.add('completed');
                document.getElementById('badgeBell').innerHTML = '✓ Selesai';
            }

            checkCompletion();
        }

        function checkCompletion() {
            if (isSubscribed && isBelled) {
                document.getElementById('btnContinue').classList.add('active');
            }
        }

        function navigateDestination() {
            if (isSubscribed && isBelled) {
                window.location.href = DESTINATION_LINK;
            }
        }
    </script>
</body>
</html>
